apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: music-platform
  namespace: music-platform
spec:
  rules:
    - host: soundloom.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: soundloom-web
                port:
                  number: 3000
